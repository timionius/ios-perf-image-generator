[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -ra
    -q
    --strict-markers
    --strict-config
    --tb=short
    --cov=src/image_generator
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=50
markers =
    slow: marks tests as slow running
    integration: marks tests as integration tests
    unit: marks tests as unit tests

[junitxml]
path = test-results.xml

[coverage:run]
source = src/image_generator
omit = 
    */tests/*
    */test_*
    */__pycache__/*
    */cli.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if __name__ == .__main__.:
    raise AssertionError
    raise NotImplementedError
    if 0:
    if False:
