name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install system dependencies (macOS)
      run: |
        brew update
        brew install cairo libffi freetype ghostscript
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-xdist
    
    - name: Run tests with coverage
      run: |
        export PYTHONPATH="${PYTHONPATH}:${GITHUB_WORKSPACE}"
        pytest tests/ -v -n auto --cov=src/image_generator --cov-report=xml --cov-report=term --cov-fail-under=50 --maxfail=5
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
    
    - name: Test image generation
      run: |
        python -m src.image_generator.cli --size 300 --output test_output
    
    - name: Upload generated images as artifact
      uses: actions/upload-artifact@v4
      with:
        name: test-images-python-${{ matrix.python-version }}
        path: test_output/
        retention-days: 7

  lint:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install black pylint mypy bandit isort
    
    - name: Check Black formatting
      run: black --check src/ tests/ --verbose --line-length=88
    
    - name: Check isort imports
      run: isort --check-only --profile black --line-length=88 src/ tests/
    
    - name: Run Pylint
      run: pylint src/ --fail-under=7.0 --exit-zero
    
    - name: Run MyPy type checking
      run: mypy src/ --ignore-missing-imports --no-strict-optional
    
    - name: Run Bandit security check
      run: bandit -r src/ -ll
